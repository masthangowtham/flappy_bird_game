<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy Friends</title>
    <style>
        body {
            margin: 0; 
            padding: 0; 
            background-color: #70c5ce;
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden; /* Prevents scrollbars */
            overscroll-behavior-y: contain; /* Prevents pull-to-refresh on mobile */
            font-family: 'Arial', sans-serif;
        }
        canvas {
            background-color: #70c5ce; 
            display: block;
        }
        
        /* Character Selection Menu Styles */
        #menuOverlay {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(112, 197, 206, 0.95);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            z-index: 10;
        }
        h1 { color: white; text-shadow: 2px 2px 0 #000; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-height: 70vh; overflow-y: auto; padding: 10px;
        }
        .friend-btn {
            background-color: white; border: 3px solid #000; border-radius: 10px;
            padding: 10px 20px; text-align: center; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 0 4px 0 #000; transition: transform 0.1s;
        }
        .friend-btn:active { box-shadow: 0 0 0 #000; transform: translateY(4px); }
    </style>
</head>
<body>

    <div id="menuOverlay">
        <h1>Select Your Player</h1>
        <div class="grid" id="friendGrid">
            </div>
    </div>

    <canvas id="gameCanvas" style="display: none;"></canvas>
    
    <script src="game.js"></script>
</body>
</html>
